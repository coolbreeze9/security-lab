networks:
  security-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

services:
  # elastic
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      security-lab:
        ipv4_address: 172.20.0.40
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./suricata/logs:/var/log/suricata:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.41
    depends_on:
      elasticsearch:
        condition: service_healthy

  # kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.42
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # suricata
  suricata-ips:
    build: ./suricata
    container_name: suricata-ips
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/var/lib/suricata/rules:ro
      - ./suricata/logs:/var/log/suricata
    restart: unless-stopped

  # dvwa
  dvwa-victim:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa-victim
    networks:
      security-lab:
        ipv4_address: 172.20.0.30
    ports:
      - "8080:80"
    restart: unless-stopped

  # kali
  kali-attacker:
    build: ./kali
    container_name: kali-attacker
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./kali/scripts:/pentest/scripts:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.10
    tty: true
    stdin_open: true
    depends_on:
      - dvwa-victim
      - suricata-ips
    restart: unless-stopped
