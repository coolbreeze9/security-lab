networks:
  security-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health?wait_for_status=yellow"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./suricata/logs:/var/log/suricata:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.41
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.42
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5601/api/status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    logging: *default-logging

  suricata-ips:
    build: ./suricata
    container_name: suricata-ips
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/var/lib/suricata/rules:ro
      - ./suricata/logs:/var/log/suricata
    restart: unless-stopped
    logging: *default-logging

  dvwa-victim:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa-victim
    networks:
      security-lab:
        ipv4_address: 172.20.0.30
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost --silent && test -f /var/run/apache2/apache2.pid"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging

  kali-attacker:
    build: ./kali
    container_name: kali-attacker
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./kali/scripts:/pentest/scripts:ro
    networks:
      security-lab:
        ipv4_address: 172.20.0.10
    tty: true
    stdin_open: true
    depends_on:
      dvwa-victim:
        condition: service_healthy
      suricata-ips:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
