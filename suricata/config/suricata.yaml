%YAML 1.1
---
vars:
  address-groups:
    HOME_NET: "[172.20.0.0/16]"
    EXTERNAL_NET: "!$HOME_NET"
    DVWA_SERVER: "172.20.0.30"
    KALI_ATTACKER: "172.20.0.10"
  port-groups:
    HTTP_PORTS: "80"
    HTTPS_PORTS: "443"

default-rule-path: /var/lib/suricata/rules

rule-files:
  - local.rules

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            tagged-packets: yes
        - http:
            extended: yes
        - dns
        - drop
  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  - stats:
      enabled: yes
      filename: stats.log
      interval: 60

af-packet:
  - interface: br-039bbf624c5e
    threads: 1
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

app-layer:
  protocols:
    http:
      enabled: yes
    tls:
      enabled: yes
    dns:
      enabled: yes

logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
    - file:
        enabled: yes
        filename: suricata.log
        level: info
